# Orquestração de PRODUÇÃO/HOMOLOGAÇÃO (VPS).
# Sobe imagens já construídas e publicadas no GHCR pelo pipeline de CI/CD —
# não builda a partir do código local. Para desenvolvimento, use
# docker-compose.dev.yml (docker compose -f docker-compose.dev.yml up -d).
#
# Variáveis esperadas em ./.env (não versionado, ver docs/vps_deploy.md):
#   GHCR_OWNER, IMAGE_TAG, DB_DATABASE, DB_USERNAME, DB_PASSWORD,
#   API_DOMAIN, APP_DOMAIN
# Variáveis do Laravel (APP_KEY, etc.) ficam em ./src/backend/.env.
#
# TLS: Cloudflare em modo "Full (strict)" na frente — o Caddy do serviço
# "backend" usa um certificado Cloudflare Origin CA (não Let's Encrypt).
# Os arquivos do certificado ficam em ./certs/ (não versionado, ver
# docs/vps_deploy.md).

services:
  db:
    image: postgres:16-alpine
    container_name: goodfood_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-goodfood}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env do VPS}
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - goodfood_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-root} -d ${DB_DATABASE:-goodfood}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_OWNER}/goodfood-backend:${IMAGE_TAG:-latest}
    container_name: goodfood_backend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./src/backend/.env
    environment:
      API_DOMAIN: ${API_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - backend_storage:/app/storage/app
      - ./src/backend/.env:/app/.env
      - ./certs/cloudflare-origin.pem:/etc/caddy/certs/cloudflare-origin.pem:ro
      - ./certs/cloudflare-origin.key:/etc/caddy/certs/cloudflare-origin.key:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - goodfood_network

  scheduler:
    image: ghcr.io/${GHCR_OWNER}/goodfood-backend:${IMAGE_TAG:-latest}
    container_name: goodfood_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - ./src/backend/.env
    volumes:
      - backend_storage:/app/storage/app
      - ./src/backend/.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - goodfood_network

  frontend:
    image: ghcr.io/${GHCR_OWNER}/goodfood-frontend:${IMAGE_TAG:-latest}
    container_name: goodfood_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - goodfood_network

networks:
  goodfood_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  backend_storage:
    driver: local
