# Docker compose CI/CD GitHub Production/Staging Orchestration (VPS).

services:
  db:
    image: postgres:16-alpine
    container_name: goodfood_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-goodfood}
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no .env do VPS}
    ports:
      # VPS loopback only — never exposed to the internet. External access
      # should be through an SSH tunnel (see docs/vps_deploy.md#acesso-ao-banco-via-dbeaver).
      - "127.0.0.1:5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - goodfood_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-root} -d ${DB_DATABASE:-goodfood}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_OWNER}/goodfood-backend:${IMAGE_TAG:-latest}
    container_name: goodfood_backend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./src/backend/.env
    environment:
      API_DOMAIN: ${API_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - backend_storage:/app/storage/app
      - ./src/backend/.env:/app/.env
      - ./certs/cloudflare-origin.pem:/etc/caddy/certs/cloudflare-origin.pem:ro
      - ./certs/cloudflare-origin.key:/etc/caddy/certs/cloudflare-origin.key:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - goodfood_network

  scheduler:
    image: ghcr.io/${GHCR_OWNER}/goodfood-backend:${IMAGE_TAG:-latest}
    container_name: goodfood_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - ./src/backend/.env
    volumes:
      - backend_storage:/app/storage/app
      - ./src/backend/.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - goodfood_network

  frontend:
    image: ghcr.io/${GHCR_OWNER}/goodfood-frontend:${IMAGE_TAG:-latest}
    container_name: goodfood_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - goodfood_network

networks:
  goodfood_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  backend_storage:
    driver: local
